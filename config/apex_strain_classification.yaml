# APEX strain classification — pathogenic vs commensal vs ambiguous
# ------------------------------------------------------------------
# APEX (Penn) predicts MIC against 34 bacterial strains/species. APEX has NO
# native pathogen/commensal flag — clasificación hecha por nosotros con base
# en literatura básica (2026-04-30, fuentes: ATCC catalog, CDC pathogen lists,
# microbiome literature on gut commensals).
#
# Strain names usan el campo `apex_strain` exactamente como aparecen en
# `predict.py:42` y como columnas en `Predicted_MICs.csv`.
# El campo `metric_name` corresponde a la columna del consolidated
# (`apex__<metric_name>__uM`).
#
# Threshold usado por el orchestrator para "active": MIC ≤ active_mic_uM uM.
# Se puede ajustar aquí sin tocar código.

threshold:
  active_mic_uM: 32.0

pathogenic:
  - apex_strain: "P. aeruginosa PAO1"
    metric_name: MIC_P_aeruginosa_PAO1
    reason: "Pseudomonas aeruginosa PAO1 — patógeno oportunista nosocomial, ESKAPE"
  - apex_strain: "P. aeruginosa PA14"
    metric_name: MIC_P_aeruginosa_PA14
    reason: "Pseudomonas aeruginosa PA14 — cepa hipervirulenta, modelo de patogenicidad"
