# APEX strain classification — pathogenic vs commensal vs ambiguous
# ------------------------------------------------------------------
# APEX (Penn) predicts MIC against 34 bacterial strains/species. APEX has NO
# native pathogen/commensal flag — classification done by us based on basic
# microbiological literature (2026-04-30; sources: ATCC catalog, CDC
# priority-pathogen lists, microbiome literature on gut commensals).
#
# Strain names use the `apex_strain` field exactly as they appear in
# `predict.py:42` and as column headers in `Predicted_MICs.csv`.
# The `metric_name` field corresponds to the consolidated column
# (`apex__<metric_name>__uM`).
#
# Threshold used by the orchestrator for "active": MIC <= active_mic_uM uM.
# Can be adjusted here without touching code.

threshold:
  active_mic_uM: 32.0

pathogenic:
  - apex_strain: "P. aeruginosa PAO1"
    metric_name: MIC_P_aeruginosa_PAO1
    reason: "Pseudomonas aeruginosa PAO1 — opportunistic nosocomial pathogen, ESKAPE"
  - apex_strain: "P. aeruginosa PA14"
    metric_name: MIC_P_aeruginosa_PA14
    reason: "Pseudomonas aeruginosa PA14 — hypervirulent strain, pathogenicity model"
  - apex_strain: "S. aureus ATCC12600"
    metric_name: MIC_S_aureus_ATCC12600
    reason: "Staphylococcus aureus type strain — common Gram-positive pathogen"
  - apex_strain: "E. coli AIG221"
    metric_name: MIC_E_coli_AIG221
    reason: "E. coli AIG221 — antibiotic-insensitive clinical isolate, pathogen"
  - apex_strain: "E. coli AIG222"
