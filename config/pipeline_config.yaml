global:
  random_seed: 42
  min_length: 5
  max_length: 100
  standard_aa: ACDEFGHIKLMNPQRSTVWY
  uniprot_api_base: https://rest.uniprot.org/uniprotkb
  cdhit_thresholds:
  - 0.4
  - 0.6
  - 0.8
  max_retries: 3
  retry_delays:
  - 5
  - 15
  - 45
  base_output_dir: Dataset_Bioactividad
  repos_dir: Dataset_Bioactividad/Tool_Repos
  min_habitat_pct:
    marino: 0.15
    terrestre: 0.15
environments:
  ENV1-torch:
    conda_name: pipeline_torch
    pc: windows
    gpu: true
  ENV2-tf:
    conda_name: pipeline_tf
    pc: windows
    gpu: true
  ENV3-ml:
    conda_name: pipeline_ml
    pc: windows
    gpu: false
  ENV4-qsar:
    conda_name: pipeline_qsar
    pc: linux
    gpu: false
  ENV5-bertaip:
    conda_name: pipeline_bertaip
    pc: windows
    gpu: true
ssh:
  # SSH dispatch is OPTIONAL and only used by audit_lib/cdhit_utils.py when the orchestrator
  # runs on Windows and lacks a local cd-hit-2d binary. Edit these to point at your own
  # Linux node, or leave the defaults and run the pipeline entirely on Linux.
  # See README.md > Setup for details.
  linux_host: CHANGE_ME.example.com        # e.g. 192.168.1.10 or your.host.tld
  linux_user: CHANGE_ME                    # your SSH username on that node
  cdhit_binary: /usr/local/bin/cd-hit-2d   # path to cd-hit-2d on the Linux node
  sshfs_mount_windows: CHANGE_ME           # e.g. Z:/path/to/sshfs/mount (Windows side)
  linux_base_path: CHANGE_ME               # e.g. /home/<user>/work/pipeline_Work (Linux side)
tools:
  toxinpred3:
    display_name: ToxinPred3
    category: toxicity
    stage: 1-Seguridad
    github_url: https://github.com/raghavagps/toxinpred3.git
    doi: 10.1016/j.compbiomed.2024.108926
    conda_env: ml

    length_range:
    - 1
    - 35
    training_data:
      search_patterns:
      - '**/*.csv'
      - '**/*.tsv'
      - '**/*.fasta'
      - '**/*.fa'
      - '**/*.txt'
      data_keywords:
      - train
      - positive
      - negative
      - toxic
      - non-toxic
      - dataset
      sequence_column_hints:
      - sequence
      - seq
      - peptide
      - Sequence
      label_column_hints:
      - label
      - class
      - target
      - toxic
      - Label
      - Class
    run_command:
      type: python_script
      script: toxinpred3.py
      input_flag: -i
      output_flag: -o
      extra_args:
      - -m
      - '2'
      input_format: fasta
      output_format: csv
      output_parsing:
        id_column: Subject
        prediction_column: Prediction
        positive_label: Toxin
        score_column: Hybrid Score
        score_ascending: false
  hemodl:
    display_name: HemoDL
    category: hemolytic
    stage: 1-Seguridad
    github_url: https://github.com/abcair/HemoDL.git
    doi: 10.1016/j.ab.2024.115523
    conda_env: ml

    length_range:
    - 2
    - 133
    training_data:
      search_patterns:
      - data/**/*.fa
      - data/**/*.fasta
      - '**/*.fa'
      - '**/*.fasta'
      data_keywords:
      - D1
      - D2
      - D3
      - D4
      - hemolytic
      - train
      sequence_column_hints:
      - sequence
      label_column_hints:
      - label
      label_source: filename
      positive_filename_pattern: _pos
      negative_filename_pattern: _neg
    run_command:
      type: python_script
      script: source/predict.py
      input_format: fasta
      output_format: csv
      arg_style: flagged
      input_flag: -p
      output_flag: null
      output_capture: hardcoded_file
      hardcoded_output_name: predict_results.csv
      output_parsing:
        header: false
        id_column_index: 0
        score_column_index: 1
        prediction_column: null
        positive_label: null
        score_ascending: false
        score_threshold: 0.5
        positive_class_label: Hemolytic
        negative_class_label: Non-Hemolytic
    standby: false
    weights_download:
      platform: in_repo
      notes: LightGBM models in source/models/. ESM-2 650M and ProtT5-XL downloaded from HuggingFace on first run (~4GB).
      auto_download: true
  hemopi2:
    display_name: HemoPI2
    category: hemolytic
    stage: 1-Seguridad
    github_url: https://github.com/raghavagps/hemopi2.git
    doi: 10.1038/s42003-025-07615-w
    conda_env: torch

    length_range:
    - 2
    - 100
    training_data:
      search_patterns:
      - Dataset/*.csv
      - '**/*.csv'
      data_keywords:
      - cross_val
      - independent
      - hemolytic
      - train
      sequence_column_hints:
      - Sequence
      - sequence
      - seq
      label_column_hints:
      - label
      - Label
      - class
      label_source: column
    run_command:
      type: python_script
      script: hemopi2_classification.py
      input_format: fasta
      output_format: csv
      arg_style: flagged
      input_flag: -i
      output_flag: -o
      output_capture: hardcoded_file
      hardcoded_output_name: predictions_hemopi2.csv
      extra_args:
      - -m
      - '3'
      - -j
      - '1'
      - -d
      - '2'
      - -wd
      - .
      output_parsing:
        id_column: SeqID
        prediction_column: Prediction
        positive_label: Hemolytic
        score_column: ESM Score
        score_ascending: false
        notes: 'Mode 3 (ESM2-t6 finetuned alone, threshold 0.58 — paper default). Switched from -m 4 (Hybrid2 ESM+MERCI) on 2026-04-30 because MERCI motif scoring returns sentinel -1.0 for short peptides with no motif matches and collapses the Hybrid Score to 0 — fails on canonical controls (melittin). The paper reports AUC ~0.85 for ESM alone on its independent test set; the Hybrid2 "boost" was marginal and specific to the paper''s test set.'
    standby: false
    weights_download:
      platform: webserver
      webserver_url: https://webs.iiitd.edu.in/raghava/hemopi2/download.html
      target_path: model/
      instructions: '1. Download model zip from https://webs.iiitd.edu.in/raghava/hemopi2/download.html

        2. Unzip into hemopi2/model/

        3. Verify hemopi2_ml_clf.sav exists in model/'
      auto_download: false
  plm4alg:
    display_name: pLM4Alg
    category: allergenicity
    stage: 1-Seguridad
    github_url: https://github.com/dzjxzyd/pLM4Alg.git
    doi: 10.1021/acs.jafc.3c07143
    conda_env: torch_legacy

    length_range:
    - 10
    - 100
    training_data:
      search_patterns:
      - '**/*.csv'
      - '**/*.tsv'
      - '**/*.fasta'
      - '**/*.txt'
      data_keywords:
      - train
      - allergen
      - non-allergen
      - positive
      - negative
      sequence_column_hints:
      - sequence
      - seq
      - peptide
      label_column_hints:
      - label
      - class
      - allergen
    run_command:
      type: python_script
      script: predict.py
      input_format: fasta
      output_format: csv
    standby: true
    standby_reason: No runnable Python scripts — entire codebase is Jupyter notebooks (Google Colab). Training data only in
      XLSX format (not CSV/FASTA). Model weights on institutional SharePoint (may require KSU login). Requires manual refactoring
      before pipeline integration.
  bert_ampep60:
    display_name: BERT-AmPEP60
    category: antimicrobial
    stage: 2-Bioactividad
    github_url: https://github.com/janecai0714/AMP_regression_EC_SA.git
    doi: 10.1021/acs.jcim.4c01749
    conda_env: torch

    length_range:
    - 5
    - 60
    training_data:
      search_patterns:
      - data/*.csv
      - '**/*.csv'
      data_keywords:
      - train
      - EC
      - SA
      - MIC
      - pMIC
      sequence_column_hints:
      - SEQUENCE
      - Sequence
      - sequence
      label_column_hints:
      - EC_pMIC
      - SA_pMIC
      - EC_MIC
      label_source: regression_column
      regression_column: EC_pMIC
      regression_positive_threshold: 3.0
    run_command:
      type: python_script
      script: predict.py
      cwd_subdir: predict
      input_format: fasta
      output_format: csv
      arg_style: flagged
      input_flag: --input-fasta
      output_flag: --output-csv
      output_capture: file
      output_parsing:
        id_column: ID
        id_strip_prefix: '>'
        prediction_column: null
        positive_label: null
        score_column: null
        score_ascending: true
        score_threshold: null
        prediction_type: extra_only
        extra_metrics:
        - name: MIC_E_coli
          unit: uM
          field: "ec_predicted_MIC_μM"
          transform: identity
        - name: MIC_S_aureus
          unit: uM
          field: "sa_predicted_MIC_μM"
          transform: identity
      notes: Multi-target regression (E. coli + S. aureus MIC, μM). class_norm=null per orchestrator_design.md §2. Field names use literal μ character (U+03BC) as written by predict.py.
    standby: false
    weights_download:
      platform: onedrive
      notes: Script auto-downloads via onedrivedownloader package on first run from SharePoint educativo MPU (~400MB total ec+sa).
      auto_download: true
