      without the .npz files.
  bertaip:
    display_name: BertAIP
    category: anti_inflammatory
    stage: 2-Bioactividad
    github_url: https://github.com/ying-jc/BertAIP.git
    doi: null
    conda_env: pipeline_bertaip

    length_range:
    - 5
    - 54
    training_data:
      search_patterns:
      - '**/*.fasta'
      data_keywords:
      - train
      - AIP
      - anti-inflammatory
      - positive
      - negative
      sequence_column_hints:
      - sequence
      label_column_hints:
      - label
    run_command:
      type: python_script
      script: BertAIP.py
      input_format: fasta
      output_format: csv
      arg_style: flagged
      input_flag: --seq
      output_flag: --out
      output_capture: file
      output_parsing:
        id_column: SeqID
        prediction_column: Prediction of AIP
        positive_label: 1
        score_column: Probability of AIP
        score_ascending: false
        score_threshold: 0.8
        prediction_type: classification
        prefer_threshold_over_raw_class: true
        notes: 'Threshold 0.8 (raised from the 0.5 paper default on 2026-05-01) — the model is optimistic and produces too many false positives at the 0.5 cutoff on user peptides. `prefer_threshold_over_raw_class: true` forces the orchestrator to re-classify using score >= 0.8 instead of accepting the model''s internal binary decision (which uses a hardcoded 0.5 cutoff). Decision recorded in `docs/decisions.md` §10.'
    standby: false
    weights_download:
      platform: huggingface
      notes: Huggingface model yingjc/BertAIP is auto-downloaded by simpletransformers at runtime.
      auto_download: true
