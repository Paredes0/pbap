# pipeline_config_blocked.yaml
# ============================================================
# Herramientas BLOCKED / inactivas movidas desde pipeline_config.yaml
# Fecha: 2026-05-08
# Razon: Limpieza de config principal. Ver docs/pipeline_viability.md
#   para el detalle de por que cada tool fue clasificado BLOCKED.
# ============================================================
#
# BLOCKED estructurales (10): sin scripts de inferencia, sin pesos,
#   o dependencia de servicios externos irreproducibles.
