      input_format: csv
      output_format: csv
    standby: true
    standby_reason: No standalone predict script. 7-step feature extraction pipeline requires external web services (ESMAtlas
      for 3D structure, NetSurfP-3.0 for secondary structure) that cannot be fully automated offline. No saved model weights
      in repo. Ensemble.py __main__ uses dummy random data. Coronavirus-specific tool.

