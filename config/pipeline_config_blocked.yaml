tools:

  aapl:
    display_name: AAPL
    category: anti_angiogenic
    stage: 2-Bioactividad
    github_url: https://github.com/yunzheng2002/Anti-angiogenic.git
    doi: 10.1038/s41598-024-65062-9
    conda_env: ml_pycaret

    length_range:
    - 5
    - 50
    training_data:
      search_patterns:
      - '**/*.csv'
      - '**/*.tsv'
      - '**/*.fasta'
      - '**/*.txt'
      data_keywords:
      - train
      - anti-angiogenic
      - AAP
      - positive
      - negative
      sequence_column_hints:
      - sequence
      - seq
      - peptide
      label_column_hints:
      - label
      - class
    run_command:
      type: python_script
      script: predict.py
      input_format: csv
      output_format: csv

