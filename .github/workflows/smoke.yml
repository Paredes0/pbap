name: Smoke test (import + dry run)

on:
  push:
    branches: [master, main, develop_public]
  pull_request:
    branches: [master, main, develop_public]

permissions:
  contents: read

jobs:
  smoke:
    name: Lint config + import + dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lightweight deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pandas numpy openpyxl requests

      - name: Validate YAML config files parse
        run: |
          python - <<'PY'
          import yaml, pathlib, sys
          paths = [
              "config/pipeline_config.yaml",
              "config/pipeline_config_blocked.yaml",
              "config/categories_config.yaml",
              "config/apex_strain_classification.yaml",
          ]
          errors = []
          for p in paths:
              fp = pathlib.Path(p)
              if not fp.exists():
                  errors.append(f"MISSING: {p}")
                  continue
              try:
                  with open(fp, "r", encoding="utf-8") as f:
                      yaml.safe_load(f)
                  print(f"OK   {p}")
              except yaml.YAMLError as e:
                  errors.append(f"PARSE-ERROR {p}: {e}")
          if errors:
              for e in errors: print(e, file=sys.stderr)
              sys.exit(1)
          print("All YAML config files parsed OK.")
          PY

      - name: Validate example FASTA exists and is well-formed
        run: |
          python - <<'PY'
          import pathlib, sys
          p = pathlib.Path("Inputs/example.fasta")
          if not p.exists():
              sys.exit(f"MISSING: {p}")
          text = p.read_text(encoding="utf-8")
          lines = [l.strip() for l in text.splitlines() if l.strip()]
          headers = [l for l in lines if l.startswith(">")]
          seqs = [l for l in lines if not l.startswith(">")]
          if not headers:
              sys.exit("No FASTA headers found in example.fasta")
          if len(headers) != len(seqs):
              sys.exit(f"Header/sequence mismatch: {len(headers)} headers vs {len(seqs)} sequences")
          for s in seqs:
              bad = set(s.upper()) - set("ACDEFGHIKLMNPQRSTVWY")
              if bad:
                  sys.exit(f"Non-standard residues in a sequence: {bad}")
          print(f"OK example.fasta: {len(headers)} peptides")
          PY

      - name: Validate audit_lib imports
        run: |
          python - <<'PY'
          import importlib, sys
          modules = [
              "audit_lib.config",
              "audit_lib.tool_runner",
              "audit_lib.cdhit_utils",
              "audit_lib.sequence_utils",
              "audit_lib.db_parsers",
              "audit_lib.logging_setup",
          ]
          failed = []
          for m in modules:
              try:
                  importlib.import_module(m)
                  print(f"OK   {m}")
              except Exception as e:
                  failed.append(f"FAIL {m}: {type(e).__name__}: {e}")
          if failed:
              for f in failed: print(f, file=sys.stderr)
              sys.exit(1)
          print("All audit_lib modules import OK.")
          PY

      - name: Check no personal paths remain in tracked files
        run: |
          # Only check files actually tracked by git (what gets published).
          # Patterns are split-and-concatenated so this step does not
          # match its own source. The workflow file itself is also
          # excluded via grep -v before the search.
          P1A='/home/'; P1B='noe'
          P2A='192.';   P2B='168.18.7'
          PATTERN="${P1A}${P1B}|${P2A}${P2B}"
          if git ls-files -z                | grep -zv "^.github/workflows/smoke.yml$"                | xargs -0 -r grep -InE "${PATTERN}" ; then
              echo "::error::Personal markers found in tracked files."
              exit 1
          fi
          echo "OK: no personal markers found in tracked files."
