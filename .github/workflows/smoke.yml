name: Smoke test (import + dry run)

on:
  push:
    branches: [master, main, develop_public]
  pull_request:
    branches: [master, main, develop_public]

permissions:
  contents: read

jobs:
  smoke:
    name: Lint config + import + dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lightweight deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate YAML config files parse
        run: |
          python - <<'PY'
          import yaml, pathlib, sys
          paths = [
              "config/pipeline_config.yaml",
              "config/pipeline_config_blocked.yaml",
              "config/categories_config.yaml",
              "config/apex_strain_classification.yaml",
          ]
          errors = []
          for p in paths:
              fp = pathlib.Path(p)
              if not fp.exists():
                  errors.append(f"MISSING: {p}")
                  continue
              try:
                  with open(fp, "r", encoding="utf-8") as f:
                      yaml.safe_load(f)
                  print(f"OK   {p}")
              except yaml.YAMLError as e:
                  errors.append(f"PARSE-ERROR {p}: {e}")
          if errors:
              for e in errors: print(e, file=sys.stderr)
              sys.exit(1)
          print("All YAML config files parsed OK.")
          PY

      - name: Validate example FASTA exists and is well-formed
        run: |
          python - <<'PY'
          import pathlib, sys
          p = pathlib.Path("Inputs/example.fasta")
          if not p.exists():
              sys.exit(f"MISSING: {p}")
          text = p.read_text(encoding="utf-8")
          lines = [l.strip() for l in text.splitlines() if l.strip()]
          headers = [l for l in lines if l.startswith(">")]
          seqs = [l for l in lines if not l.startswith(">")]
          if not headers:
              sys.exit("No FASTA headers found in example.fasta")
          if len(headers) != len(seqs):
              sys.exit(f"Header/sequence mismatch: {len(headers)} headers vs {len(seqs)} sequences")
          for s in seqs:
              bad = set(s.upper()) - set("ACDEFGHIKLMNPQRSTVWY")
              if bad:
                  sys.exit(f"Non-standard residues in a sequence: {bad}")
          print(f"OK example.fasta: {len(headers)} peptides")
          PY

      - name: Validate audit_lib imports
        run: |
          python - <<'PY'
          import importlib, sys
          modules = [
              "audit_lib.config",
              "audit_lib.tool_runner",
              "audit_lib.cdhit_utils",
              "audit_lib.sequence_utils",
              "audit_lib.db_parsers",
              "audit_lib.logging_setup",
          ]
          failed = []
          for m in modules:
              try:
                  importlib.import_module(m)
                  print(f"OK   {m}")
              except Exception as e:
                  failed.append(f"FAIL {m}: {type(e).__name__}: {e}")
          if failed:
              for f in failed: print(f, file=sys.stderr)
              sys.exit(1)
          print("All audit_lib modules import OK.")
          PY

      - name: Validate bootstrap scripts are syntactically valid bash
        run: |
          set -e
          for s in scripts/bootstrap_tools.sh scripts/bootstrap_envs.sh; do
            bash -n "$s" && echo "OK   $s"
          done

      - name: Validate patch files are well-formed unified diffs
        run: |
          python - <<'PY'
          import pathlib, sys, re
          patches = sorted(pathlib.Path("patches").glob("*.patch"))
          if not patches:
              sys.exit("No patches/*.patch found")
          ok, bad = [], []
          # Minimal unified-diff sanity: must have at least one `diff --git`
          # or `--- a/...` and one `+++ b/...` plus one hunk header `@@ ... @@`.
          hunk_re = re.compile(r"^@@ .* @@", re.MULTILINE)
          for p in patches:
              text = p.read_text(encoding="utf-8", errors="replace")
              has_old = "--- a/" in text or "--- " in text
              has_new = "+++ b/" in text or "+++ " in text
              has_hunk = hunk_re.search(text) is not None
              if has_old and has_new and has_hunk:
                  ok.append(p.name)
              else:
                  bad.append(f"{p.name}: old={has_old} new={has_new} hunk={has_hunk}")
          if bad:
              for b in bad: print("FAIL", b, file=sys.stderr)
              sys.exit(1)
          print(f"OK {len(ok)} patch files well-formed: {', '.join(ok)}")
          PY

      - name: Validate env YAML manifests parse and declare a name
        run: |
          python - <<'PY'
          import yaml, pathlib, sys
          envs = sorted(pathlib.Path("envs").glob("*.yaml"))
          if not envs:
              sys.exit("No envs/*.yaml found")
          expected_envs = {"ml", "torch", "qsar", "torch_legacy",
                          "deepb3p_legacy", "pipeline_bertaip"}
          seen = set()
          for e in envs:
              with open(e, "r", encoding="utf-8") as f:
                  doc = yaml.safe_load(f)
              if not isinstance(doc, dict) or "name" not in doc:
                  sys.exit(f"FAIL {e}: missing top-level 'name:'")
              seen.add(doc["name"])
              print(f"OK   {e.name}  (name={doc['name']})")
          missing = expected_envs - seen
          if missing:
              sys.exit(f"Missing required env manifests for: {sorted(missing)}")
          print(f"All {len(envs)} env manifests parse and cover the 6 core envs.")
          PY

      - name: Check no personal paths remain in tracked files
        run: |
          # Only check files actually tracked by git (what gets published).
          # Patterns are split-and-concatenated so this step does not
          # match its own source. The workflow file itself is also
          # excluded via grep -v before the search.
          P1A='/home/'; P1B='noe'
          P2A='192.';   P2B='168.18.7'
          PATTERN="${P1A}${P1B}|${P2A}${P2B}"
          if git ls-files -z                | grep -zv "^.github/workflows/smoke.yml$"                | xargs -0 -r grep -InE "${PATTERN}" ; then
              echo "::error::Personal markers found in tracked files."
              exit 1
          fi
          echo "OK: no personal markers found in tracked files."
